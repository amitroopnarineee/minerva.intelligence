<!DOCTYPE html>
<html lang="en" class="mn-workspace-html">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Minerva — Audience Scoring</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
/* Counter-invert images when parent has light mode */
.mn-parent-inverted img{filter:invert(1)}
:root{
  --mn-bg:#000;
  --mn-sf:rgba(255,255,255,0.04);
  --mn-border:rgba(255,255,255,0.06);
  --mn-border-h:rgba(255,255,255,0.12);
  --mn-t1:rgba(255,255,255,0.90);
  --mn-t2:rgba(255,255,255,0.55);
  --mn-t3:rgba(255,255,255,0.32);
  --mn-white:#fff;
  --mn-r:10px;
  --mn-g:10px;
  --mn-font:'Overused Grotesk',ui-sans-serif,system-ui,sans-serif;
}
html.mn-workspace-html,body.mn-workspace-body{height:100%;overflow:hidden;background:var(--mn-bg);color:var(--mn-t1);font-family:var(--mn-font);font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased;margin:0;padding:0}
::selection{background:rgba(255,255,255,0.15)}

.mn-workspace-shell{position:fixed;inset:var(--mn-g);display:flex;flex-direction:column;gap:var(--mn-g);padding:25px 0 0 0!important;z-index:1}

/* ═══ TOPBAR ═══ */
.mn-workspace-topbar{display:none}
.mn-workspace-topbar-left{display:flex;align-items:center;gap:10px}
.mn-workspace-topbar-logo{display:flex;align-items:center;gap:6px;font-weight:600;font-size:13px;letter-spacing:-0.02em}
.mn-workspace-topbar-logo-icon{width:14px;height:14px;opacity:0.4}
.mn-workspace-topbar-separator{width:1px;height:14px;background:var(--mn-border)}
.mn-workspace-topbar-context{font-size:11px;color:var(--mn-t3)}
.mn-workspace-topbar-context-name{color:var(--mn-t2)}
.mn-workspace-topbar-right{display:flex;align-items:center;gap:5px}
.mn-workspace-topbar-btn{height:26px;padding:0 10px;border-radius:6px;border:1px solid var(--mn-border);background:0;color:var(--mn-t2);font-size:10px;font-weight:500;cursor:pointer;transition:all .12s;font-family:var(--mn-font);display:inline-flex;align-items:center;gap:4px}
.mn-workspace-topbar-btn:hover{border-color:var(--mn-border-h);color:var(--mn-t1)}
.mn-workspace-topbar-btn-on{border-color:rgba(255,255,255,0.2);color:var(--mn-t1);background:rgba(255,255,255,0.04)}
.mn-workspace-topbar-save{height:28px;padding:0 14px;border-radius:8px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.06);color:var(--mn-white);font-size:11px;font-weight:500;cursor:pointer;font-family:var(--mn-font);display:inline-flex;align-items:center;gap:4px;transition:all .12s}
.mn-workspace-topbar-save:hover{background:rgba(255,255,255,0.10)}
.mn-workspace-topbar-segments{position:relative}
.mn-workspace-topbar-segments-menu{position:absolute;top:32px;right:0;background:var(--mn-sf);border:1px solid var(--mn-border);border-radius:6px;padding:4px;min-width:200px;z-index:50;display:none}
.mn-workspace-topbar-segments-menu-open{display:block}
.mn-workspace-topbar-segments-item{display:block;width:100%;text-align:left;padding:6px 10px;border:0;background:0;color:var(--mn-t2);font-size:11px;font-family:var(--mn-font);cursor:pointer;border-radius:4px;transition:all .12s}
.mn-workspace-topbar-segments-item:hover{background:rgba(255,255,255,0.04);color:var(--mn-t1)}
.mn-workspace-topbar-segments-empty{padding:8px 10px;color:var(--mn-t3);font-size:10px}

/* ═══ MAIN ═══ */
.mn-workspace-main{flex:1;display:flex;gap:var(--mn-g);min-height:0;overflow:hidden}

/* ═══ PANEL ═══ */
.mn-workspace-panel{background:var(--mn-sf);border:1px solid var(--mn-border);border-radius:var(--mn-r);display:flex;flex-direction:column;overflow:hidden;min-width:0;transition:opacity .2s,flex .25s ease}
.mn-workspace-panel-header{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:1px solid var(--mn-border);flex-shrink:0}
.mn-workspace-panel-header-title{font-size:11px;font-weight:600;color:var(--mn-t3);text-transform:uppercase;letter-spacing:0.06em;visibility:hidden}
.mn-workspace-panel-header-meta{font-size:11px;color:var(--mn-t3);font-variant-numeric:tabular-nums}
.mn-workspace-panel-body{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-mask-image:linear-gradient(to bottom,transparent 0%,black 4%,black 85%,transparent 100%);mask-image:linear-gradient(to bottom,transparent 0%,black 4%,black 85%,transparent 100%)}
.mn-workspace-panel-body::-webkit-scrollbar{width:4px}
.mn-workspace-panel-body::-webkit-scrollbar-track{background:transparent}
.mn-workspace-panel-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px}

/* ═══ SLIDER ═══ */
.mn-workspace-slider{background:var(--mn-sf);border:1px solid var(--mn-border);border-radius:var(--mn-r);padding:6px 14px;display:flex;align-items:center;gap:16px;flex-shrink:0;height:44px}
.mn-workspace-slider-left{min-width:80px}
.mn-workspace-slider-title{font-size:10px;color:var(--mn-t3);text-transform:uppercase;letter-spacing:0.06em;font-weight:600;display:none}
.mn-workspace-slider-range-value{font-size:16px;font-weight:700;letter-spacing:-0.03em;font-variant-numeric:tabular-nums}
.mn-workspace-slider-track-area{flex:1;position:relative;height:28px;display:flex;align-items:center}
.mn-workspace-slider-track{position:absolute;left:0;right:0;height:2px;background:rgba(255,255,255,0.04);border-radius:1px}
.mn-workspace-slider-fill{position:absolute;height:2px;background:var(--mn-white);border-radius:1px;opacity:0.5;transition:left 25ms,width 25ms}
.mn-workspace-slider-histogram{position:absolute;left:0;right:0;bottom:0;height:100%;display:flex;align-items:flex-end;pointer-events:none;z-index:1}
.mn-workspace-slider-hist-bar{flex:1;border-radius:1px 1px 0 0;background:rgba(255,255,255,0.025);transition:background .12s;min-width:1px}
.mn-workspace-slider-hist-bar-on{background:rgba(255,255,255,0.12)}
.mn-workspace-slider-thumb{position:absolute;width:14px;height:14px;border-radius:50%;background:var(--mn-white);cursor:grab;transform:translateX(-50%);z-index:3;transition:box-shadow .1s,transform .06s}
.mn-workspace-slider-thumb:hover{box-shadow:0 0 0 4px rgba(255,255,255,0.1);transform:translateX(-50%) scale(1.1)}
.mn-workspace-slider-thumb:active{cursor:grabbing;box-shadow:0 0 0 6px rgba(255,255,255,0.12)}
.mn-workspace-slider-stats{display:flex;gap:12px;align-items:center}
.mn-workspace-slider-stat{text-align:center;min-width:44px}
.mn-workspace-slider-stat-value{font-size:13px;font-weight:700;letter-spacing:-0.02em;font-variant-numeric:tabular-nums}
.mn-workspace-slider-stat-label{font-size:10px;color:var(--mn-t3);text-transform:uppercase;letter-spacing:0.05em;font-weight:600}

/* ═══ TABLE ═══ */
.mn-workspace-search{padding:10px!important;border-bottom:1px solid var(--mn-border);position:relative}
.mn-workspace-search-icon{position:absolute;left:21px;top:50%;transform:translateY(-50%);color:var(--mn-t3);width:11px;height:11px;pointer-events:none}
.mn-workspace-search-input{width:100%;background:rgba(255,255,255,0.02);border:1px solid transparent;border-radius:8px;padding:7px 10px 7px 28px;color:var(--mn-t1);font-size:12px;font-family:var(--mn-font);outline:0;transition:border-color .15s}
.mn-workspace-search-input:focus{border-color:rgba(255,255,255,0.12)}
.mn-workspace-search-input::placeholder{color:var(--mn-t3)}
.mn-workspace-table{width:100%;border-collapse:collapse}
.mn-workspace-table-thead{position:sticky;top:0;z-index:1;background:var(--mn-bg)!important}
.mn-workspace-table-th{padding:8px 12px;text-align:left;font-size:10px;font-weight:600;color:var(--mn-t3);text-transform:uppercase;letter-spacing:0.05em;background:var(--mn-bg);border-bottom:1px solid var(--mn-border);white-space:nowrap;cursor:pointer;user-select:none;transition:color .12s}
.mn-workspace-table-th:hover{color:var(--mn-t2)}
.mn-workspace-table-th-active{color:var(--mn-t1)}
.mn-workspace-table-th-arrow{font-size:8px;margin-left:2px;opacity:0.4}
.mn-workspace-table-row{border-bottom:1px solid rgba(255,255,255,0.02);cursor:pointer;transition:background .12s}
.mn-workspace-table-row:hover{background:rgba(255,255,255,0.04)}
.mn-workspace-table-row-selected{background:rgba(255,255,255,0.06) !important;box-shadow:inset 2px 0 0 rgba(255,255,255,0.35)}
.mn-workspace-table-td{padding:8px 12px;font-size:12px;white-space:nowrap;vertical-align:middle;color:var(--mn-t2);background:transparent}
.mn-workspace-table-person{display:flex;align-items:center;gap:8px}
.mn-workspace-table-avatar{width:24px;height:24px;border-radius:50%;object-fit:cover;background:rgba(255,255,255,0.03);flex-shrink:0}
.mn-workspace-table-name{font-weight:500;color:var(--mn-t1);font-size:13px}
.mn-workspace-table-subtitle{font-size:12px;color:rgba(255,255,255,0.47);letter-spacing:-0.3px}
.mn-workspace-score-badge{display:inline-flex;align-items:center;justify-content:center;min-width:28px;height:20px;border-radius:4px;font-size:11px;font-weight:700;font-variant-numeric:tabular-nums;padding:0 5px;background:rgba(255,255,255,0.04);color:var(--mn-t2)}
.mn-workspace-score-badge-high{background:rgba(255,41,250,0.12);color:var(--mn-white)}
.mn-workspace-score-badge-mid{background:rgba(255,255,255,0.06);color:var(--mn-t1)}
.mn-workspace-score-badge-low{background:rgba(255,255,255,0.02);color:var(--mn-t3)}
.mn-workspace-channel-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px}
.mn-workspace-channel-on{background:var(--mn-white);opacity:0.5}
.mn-workspace-channel-off{background:rgba(255,255,255,0.04);opacity:1}
.mn-workspace-table-overflow{text-align:center;color:var(--mn-t3);padding:8px;font-size:11px}
/* Tab switcher in panel header */
.mn-panel-tabs{display:flex;gap:0;margin-left:12px}
.mn-panel-tab{height:24px;padding:0 12px;border:1px solid var(--mn-border);background:transparent;color:var(--mn-t3);font-size:11px;font-weight:500;cursor:pointer;font-family:var(--mn-font);transition:all .12s;border-radius:0}
.mn-panel-tab:first-child{border-radius:6px 0 0 6px}
.mn-panel-tab:last-child{border-radius:0 6px 6px 0}
.mn-panel-tab:not(:first-child){border-left:none}
.mn-panel-tab-on{background:rgba(255,255,255,0.06);color:var(--mn-t1);border-color:rgba(255,255,255,0.12)}
/* Hide overflow dots until row hover */
.mn-workspace-table-row .mn-workspace-table-dots{opacity:0;transition:opacity .15s}
.mn-workspace-table-row:hover .mn-workspace-table-dots{opacity:1}
.mn-workspace-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;color:var(--mn-t3);font-size:11px;gap:6px}

/* ═══ DETAIL ═══ */
.mn-workspace-detail-section{padding:10px;border-bottom:1px solid var(--mn-border)}
.mn-workspace-detail-section:last-child{border-bottom:0}
.mn-workspace-detail-label{font-size:10px;font-weight:600;color:var(--mn-t3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px}
.mn-workspace-detail-hero{font-size:42px;font-weight:600;letter-spacing:-0.03em;line-height:1;margin-bottom:8px;margin-top:16px;border-top:none;padding-top:0;transition:opacity .15s}
.mn-workspace-detail-hero-sub{font-size:12px;color:var(--mn-t3);margin-top:4px}
/* Multi-select */
.mn-workspace-select-bar{display:flex;align-items:center;gap:8px;padding:6px 14px;border-bottom:1px solid var(--mn-border);font-size:10px;color:var(--mn-t2);background:rgba(255,255,255,0.02)}
.mn-workspace-select-bar-count{font-weight:600;color:var(--mn-t1)}
.mn-workspace-select-bar-actions{margin-left:auto;display:flex;gap:3px}
.mn-workspace-delta-row{display:flex;align-items:center;gap:5px;margin-bottom:4px}
.mn-workspace-delta-label{width:80px;color:var(--mn-t2);text-align:left;flex-shrink:0;font-size:11px}
.mn-workspace-delta-track{flex:1;height:4px;background:rgba(255,255,255,0.02);border-radius:2px;overflow:hidden}
.mn-workspace-delta-fill{height:100%;border-radius:2px;transition:width .3s ease}
.mn-workspace-delta-fill-pos{background:#fff;opacity:0.7}
.mn-workspace-delta-fill-neg{background:#f87171;opacity:0.4}
.mn-workspace-delta-value{width:50px;text-align:right;font-weight:600;font-variant-numeric:tabular-nums;font-size:11px;letter-spacing:-0.5px;color:var(--mn-white)}
.mn-workspace-dist-row{display:flex;align-items:center;gap:5px;margin-bottom:4px}
.mn-workspace-dist-label{font-size:10px;color:var(--mn-t2);width:75px;flex-shrink:0;text-align:left}
.mn-workspace-dist-track{flex:1;height:3px;background:rgba(255,255,255,0.02);border-radius:2px;overflow:hidden}
.mn-workspace-dist-fill{height:100%;border-radius:2px;background:var(--mn-white);opacity:0.25;transition:width .3s ease}
.mn-workspace-dist-value{font-size:10px;color:var(--mn-t3);width:30px;font-variant-numeric:tabular-nums;text-align:right}
.mn-workspace-reach-row{display:flex;align-items:center;gap:6px;padding:3px 0}
.mn-workspace-reach-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;background:var(--mn-white)}
.mn-workspace-reach-dot-low{opacity:0.15}
.mn-workspace-reach-dot-mid{opacity:0.35}
.mn-workspace-reach-dot-high{opacity:0.7}
.mn-workspace-reach-name{font-size:12px;color:var(--mn-t2);flex:1}
.mn-workspace-reach-count{font-size:12px;font-weight:600;font-variant-numeric:tabular-nums}
.mn-workspace-reach-pct{font-size:11px;color:var(--mn-t3);width:40px;text-align:right}
.mn-workspace-action-row{display:flex;gap:4px;flex-wrap:wrap}
.mn-workspace-action-btn{height:26px;padding:0 10px;border-radius:6px;border:1px solid var(--mn-border);background:0;color:var(--mn-t2);font-size:10px;font-weight:500;cursor:pointer;transition:all .12s;font-family:var(--mn-font);display:inline-flex;align-items:center}
.mn-workspace-action-btn:hover{border-color:var(--mn-border-h);color:var(--mn-t1)}
.mn-workspace-action-btn-primary{border-color:rgba(255,255,255,0.15);color:var(--mn-t1);background:rgba(255,255,255,0.06)}
.mn-workspace-action-btn-primary:hover{background:rgba(255,255,255,0.10)}

/* ═══ PROFILE (inline column) ═══ */
.mn-workspace-profile-hero{padding:16px 18px;border-bottom:1px solid var(--mn-border)}
.mn-workspace-profile-identity{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.mn-workspace-profile-avatar{width:36px;height:36px;border-radius:50%;object-fit:cover}
.mn-workspace-profile-name{font-size:15px;font-weight:600;letter-spacing:-0.02em}
.mn-workspace-profile-role{font-size:11px;color:var(--mn-t3)}
.mn-workspace-profile-score-area{display:flex;align-items:center;gap:10px}
.mn-workspace-profile-score-number{font-size:28px;font-weight:700;letter-spacing:-0.04em;line-height:1}
.mn-workspace-profile-score-context{font-size:11px;font-weight:500}
.mn-workspace-profile-score-desc{font-size:10px;color:var(--mn-t3)}
.mn-workspace-profile-section{padding:16px 18px;border-bottom:1px solid var(--mn-border)}
.mn-workspace-profile-section:last-child{border-bottom:0}
.mn-workspace-profile-field{display:flex;justify-content:space-between;padding:3px 0;font-size:12px}
.mn-workspace-profile-field-key{color:var(--mn-t3)}
.mn-workspace-profile-field-value{color:var(--mn-t1);font-weight:500}
.mn-workspace-profile-insight{font-size:12px;line-height:1.7;color:var(--mn-t2);background:rgba(255,255,255,0.02);border:1px solid var(--mn-border);border-radius:8px;padding:12px 14px}
.mn-workspace-tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:500;background:rgba(255,255,255,0.03);border:1px solid var(--mn-border);color:var(--mn-t2);margin:2px}
.mn-workspace-tag-wrap{display:flex;flex-wrap:wrap;gap:2px}
.mn-workspace-profile-label{font-size:10px;font-weight:600;color:var(--mn-t3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px}

/* ═══ MODAL ═══ */
.mn-workspace-modal{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.mn-workspace-modal-open{opacity:1;pointer-events:auto}
.mn-workspace-modal-input{background:transparent;border:none;font-size:36px;font-weight:500;letter-spacing:-0.03em;color:var(--mn-t1);font-family:var(--mn-font);text-align:center;outline:none;width:100%;max-width:600px;caret-color:var(--mn-t1)}
.mn-workspace-modal-input::placeholder{color:var(--mn-t3)}
.mn-workspace-modal-footer{display:flex;gap:8px;position:fixed;bottom:60px;left:50%;transform:translateX(-50%)}
.mn-workspace-modal-footer .mn-modal-cancel{height:40px;padding:0 24px;border-radius:8px;border:1px solid var(--mn-border);background:transparent;color:var(--mn-t2);font-size:13px;font-weight:500;cursor:pointer;font-family:var(--mn-font);transition:all .12s}
.mn-workspace-modal-footer .mn-modal-cancel:hover{border-color:var(--mn-border-h);color:var(--mn-t1)}
.mn-workspace-modal-footer .mn-modal-save{height:40px;padding:0 24px;border-radius:8px;border:none;background:var(--mn-white);color:var(--mn-bg);font-size:13px;font-weight:500;cursor:pointer;font-family:var(--mn-font);transition:opacity .12s}
.mn-workspace-modal-footer .mn-modal-save:hover{opacity:0.85}

/* ═══ TOAST ═══ */
.mn-workspace-toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--mn-sf);border:1px solid rgba(255,255,255,0.12);border-radius:7px;padding:7px 14px;font-size:11px;color:var(--mn-t1);font-weight:500;z-index:300;opacity:0;pointer-events:none;transition:all .25s cubic-bezier(0.22,1,0.36,1)}
.mn-workspace-toast-show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Modes */
.mn-workspace-slider-modes{display:none}
.mn-workspace-slider-mode{height:24px;padding:0 9px;border-radius:6px;border:1px solid var(--mn-border);background:0;color:var(--mn-t3);font-size:10px;font-weight:500;cursor:pointer;transition:all .12s;font-family:var(--mn-font);display:inline-flex;align-items:center}
.mn-workspace-slider-mode:hover{border-color:var(--mn-border-h);color:var(--mn-t2)}
.mn-workspace-slider-mode-on{border-color:rgba(255,255,255,0.15);color:var(--mn-t1);background:rgba(255,255,255,0.06)}
.mn-workspace-slider-mode-desc{color:var(--mn-t3);font-weight:400;margin-left:2px}
/* Geo */
.mn-workspace-geo-row{display:flex;align-items:center;gap:5px;padding:2px 0;font-size:11px}
.mn-workspace-geo-name{color:var(--mn-t2);flex:1}
.mn-workspace-geo-ct{color:var(--mn-t1);font-weight:600;font-variant-numeric:tabular-nums;min-width:24px;text-align:right}
.mn-workspace-geo-bar{width:50px;height:4px;background:rgba(255,255,255,0.02);border-radius:2px;overflow:hidden}
.mn-workspace-geo-fill{height:100%;background:var(--mn-white);opacity:0.25;border-radius:2px;transition:width .3s ease}

/* Chart */
.mn-workspace-chart-wrap{position:relative;height:100px;margin:4px 0}
/* News */
.mn-workspace-profile-close{margin-left:auto;height:22px;padding:0 8px;font-size:10px}
/* Embedded overrides */
body.embedded .mn-workspace-slider{margin-top:0;background:var(--mn-bg)}
body.embedded .mn-embedded-tools{display:flex!important;position:fixed;bottom:68px;left:50%;transform:translateX(-50%);z-index:200;gap:6px;padding:5px;background:transparent;border:1px solid rgba(250,250,250,0.04);border-radius:100px;backdrop-filter:blur(16px);align-items:center;max-width:500px;overflow:clip;overflow-x:auto}
/* Entrance */
@keyframes mn-in{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.mn-workspace-in{opacity:0;animation:mn-in .3s ease forwards}

/* ═══ FLOATING TOOLBAR ═══ */
.mn-workspace-floating-toolbar{display:flex;align-items:center;gap:3px;padding:6px 8px;background:rgba(10,10,10,0.75);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border-bottom:1px solid rgba(255,255,255,0.06);z-index:20;flex-shrink:0;justify-content:center}
.mn-workspace-floating-toolbar .mn-toolbar-sep{width:1px;height:20px;background:rgba(255,255,255,0.08);margin:0 4px;flex-shrink:0}
.mn-workspace-floating-toolbar .mn-toolbar-action{height:28px;padding:0 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);color:var(--mn-t2);font-size:10px;font-weight:500;cursor:pointer;font-family:var(--mn-font);transition:all .12s;white-space:nowrap}
.mn-workspace-floating-toolbar .mn-toolbar-action:hover{border-color:rgba(255,255,255,0.15);color:var(--mn-t1)}
.mn-workspace-floating-toolbar .mn-toolbar-action-primary{border-color:rgba(255,255,255,0.15);color:var(--mn-t1);background:rgba(255,255,255,0.06)}
.mn-workspace-floating-toolbar .mn-toolbar-action-icon{height:28px;width:28px;padding:0;border-radius:8px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);color:var(--mn-t3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s}
.mn-workspace-floating-toolbar .mn-toolbar-action-icon:hover{border-color:rgba(255,255,255,0.15);color:var(--mn-t1)}
.mn-workspace-floating-toolbar .mn-toolbar-sel{font-size:10px;color:var(--mn-t2);padding:0 6px;white-space:nowrap;display:flex;align-items:center;gap:3px;font-weight:500}
.mn-toolbar-filter-wrap{position:relative}
.mn-toolbar-filter-pop{display:none;position:absolute;bottom:36px;left:0;background:rgba(10,10,10,0.96);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:6px;min-width:140px;z-index:30;backdrop-filter:blur(16px)}
.mn-toolbar-filter-pop.open{display:flex;flex-direction:column;gap:2px}
.mn-toolbar-filter-pop button{height:28px;padding:0 10px;border-radius:6px;border:0;background:0;color:rgba(255,255,255,0.45);font-size:11px;font-family:var(--mn-font);cursor:pointer;text-align:left;transition:all .1s}
.mn-toolbar-filter-pop button:hover{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.8)}
.mn-toolbar-filter-pop button.on{color:rgba(255,255,255,0.85);background:rgba(255,255,255,0.08)}
.mn-toolbar-overflow-wrap{position:relative}
.mn-toolbar-overflow-pop{display:none;position:absolute;bottom:36px;right:0;background:rgba(10,10,10,0.96);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:6px;min-width:160px;z-index:30;backdrop-filter:blur(16px)}
.mn-toolbar-overflow-pop.open{display:flex;flex-direction:column;gap:2px}
.mn-toolbar-overflow-pop button{height:28px;padding:0 10px;border-radius:6px;border:0;background:0;color:rgba(255,255,255,0.45);font-size:11px;font-family:var(--mn-font);cursor:pointer;text-align:left;transition:all .1s;white-space:nowrap}
.mn-toolbar-overflow-pop button:hover{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.8)}
@keyframes mn-float-in{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.mn-workspace-floating-toolbar .mn-workspace-slider-mode{border-radius:6px;height:28px;padding:0 12px;font-size:11px;color:var(--mn-t2);border-color:rgba(255,255,255,0.1)}
.mn-workspace-floating-toolbar .mn-workspace-slider-mode-desc{display:none}

/* ═══ PANEL ANIMATIONS ═══ */
.mn-workspace-panel{opacity:0;animation:mn-panel-in .35s cubic-bezier(0.22,1,0.36,1) forwards}
@keyframes mn-panel-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
#pDet{animation-delay:.05s;background:transparent;border:none;border-right:1px solid rgba(255,255,255,0.1)}
#pDet .mn-workspace-panel-header{border-bottom:none}
#pDet .mn-workspace-panel-body{-webkit-mask-image:none;mask-image:none}
#pTbl{animation-delay:.1s}
#pIntel{display:none}
#pProf{animation:none;opacity:1;transition:opacity .25s ease,transform .25s ease,flex .25s ease}
#pProf.mn-prof-hidden{opacity:0;transform:translateX(20px);flex:0 0 0px!important;overflow:hidden;padding:0;border:0}
.mn-workspace-profile-close-float{position:fixed;bottom:0;z-index:5;display:flex;justify-content:flex-end;padding:10px;background:transparent;width:100%}
.mn-workspace-profile-close-float button{height:22px;padding:0 8px;border-radius:6px;border:1px solid var(--mn-border);background:0;color:var(--mn-t2);font-size:10px;font-weight:500;cursor:pointer;font-family:var(--mn-font);transition:all .12s}
.mn-workspace-profile-close-float button:hover{border-color:var(--mn-border-h);color:var(--mn-t1)}

/* ═══ SLIDER STATS INSIDE DETAIL ═══ */
.mn-workspace-detail-stats{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:5px;margin-top:5px!important;border:none!important}
.mn-workspace-detail-stat-cell{background:rgba(255,255,255,0.015);border:none;border-radius:6px;padding:10px;text-align:center}
.mn-workspace-detail-stat-cell-value{font-size:14px;font-weight:700;letter-spacing:-0.02em;font-variant-numeric:tabular-nums}
.mn-workspace-detail-stat-cell-label{font-size:10px;color:var(--mn-t3);font-weight:600;text-transform:uppercase;letter-spacing:0.06em;margin-top:1px}

/* ═══ DRAG SELECT ═══ */
.mn-workspace-table-row-dragging{background:rgba(255,255,255,0.04) !important}
.mn-workspace-table-row.mn-drag-highlight{box-shadow:inset 2px 0 0 rgba(255,255,255,0.2);background:rgba(255,255,255,0.03) !important}
body.mn-dragging{cursor:crosshair !important;user-select:none !important}
body.mn-dragging *{cursor:crosshair !important;user-select:none !important}

/* ══ EMBEDDED MODE ══ */
body.embedded{padding:0!important;overflow:hidden}
body.embedded .mn-workspace-topbar{display:none!important}
body.embedded #pIntel{display:none!important}

body.embedded .mn-workspace-slider{margin-top:0}
body.embedded .mn-workspace-floating-toolbar{display:none!important}
body.mn-empty .mn-workspace-floating-toolbar{display:none!important}
body.mn-empty{overflow:hidden!important}
body.mn-empty .mn-workspace-body{overflow:hidden!important}
body.mn-empty .mn-workspace-panel-body{overflow:hidden!important;background:rgba(255,255,255,0.01)!important}
body.mn-empty .mn-workspace-main{background:#0a0a0a!important}
body.mn-empty .mn-workspace-panel{background:rgba(255,255,255,0.02)!important;border-color:rgba(255,255,255,0.05)!important}
body.mn-empty ::-webkit-scrollbar{display:none!important}
body.embedded .mn-workspace-main{padding:8px 8px 0}
body.embedded #pDet{flex:0 0 280px}
body.embedded #pTbl{flex:1}
body.embedded .mn-workspace-body{gap:0}
body.embedded .mn-embedded-tools{display:flex!important;position:fixed;bottom:68px;left:50%;transform:translateX(-50%);z-index:200;gap:6px;padding:5px 5px!important;background:transparent!important;border:1px solid #fafafa0a;border-radius:100px;backdrop-filter:blur(16px);align-items:center}
body.embedded .mn-embedded-tools button{height:26px;padding:0 10px;border-radius:6px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.02);color:var(--mn-t3);font-size:10px;font-weight:500;cursor:pointer;font-family:var(--mn-font);white-space:nowrap;transition:all .12s}
body.embedded .mn-embedded-tools button:hover{border-color:rgba(255,255,255,0.15);color:var(--mn-t2)}
body.embedded .mn-embedded-tools button.on{border-color:rgba(255,255,255,0.15);color:var(--mn-t1);background:rgba(255,255,255,0.06)}
body.embedded .mn-embedded-tools .divider{width:1px;height:14px;background:rgba(255,255,255,0.06)}
body.embedded .mn-embedded-verdict{margin-top:12px;padding:12px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);border-radius:8px}
body.embedded .mn-embedded-verdict p{font-size:11px;line-height:1.6;color:rgba(255,255,255,0.45)}
body.embedded .mn-embedded-verdict strong{color:rgba(255,255,255,0.7);font-weight:500;display:block;margin-bottom:4px;font-size:12px}
/* ═══ GUIDED TOUR ═══ */
.mn-tour-overlay{position:fixed;inset:0;z-index:9000;pointer-events:all;transition:opacity .3s}
.mn-tour-overlay.hidden{opacity:0;pointer-events:none}
.mn-tour-highlight{position:fixed;z-index:9001;border-radius:10px;box-shadow:0 0 0 9999px rgba(0,0,0,0.7);pointer-events:none;transition:all .5s cubic-bezier(.22,1,.36,1)}
.mn-tour-tooltip{position:fixed;z-index:9002;max-width:280px;padding:16px 18px;border-radius:12px;background:white;color:#111;font-size:13px;line-height:1.5;box-shadow:0 8px 32px rgba(0,0,0,0.3);opacity:0;transform:translateY(8px);transition:opacity .3s ease .2s,transform .3s ease .2s}
.mn-tour-tooltip.visible{opacity:1;transform:translateY(0)}
.mn-tour-tooltip-step{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:#999;margin-bottom:4px;font-weight:600}
.mn-tour-tooltip-title{font-size:15px;font-weight:600;letter-spacing:-.02em;margin-bottom:4px}
.mn-tour-tooltip-desc{color:#555;font-size:12px;line-height:1.5}
.mn-tour-tooltip-footer{display:flex;align-items:center;justify-content:space-between;margin-top:12px}
.mn-tour-tooltip-skip{font-size:10px;color:#999;cursor:pointer;background:none;border:none;padding:0}
.mn-tour-tooltip-skip:hover{color:#333}
.mn-tour-tooltip-next{font-size:11px;font-weight:600;color:white;background:#111;border:none;border-radius:20px;padding:5px 14px;cursor:pointer}
.mn-tour-tooltip-next:hover{background:#333}
.mn-tour-tooltip-dots{display:flex;gap:4px;align-items:center}
.mn-tour-tooltip-dot{width:5px;height:5px;border-radius:50%;background:#ddd}
.mn-tour-tooltip-dot.active{background:#111;width:6px;height:6px}
/* ═══ AI CHAT PANEL ═══ */
#pChat{flex:0 0 340px;flex-direction:column;background:var(--mn-bg);border:1px solid var(--mn-border);border-radius:var(--mn-r);overflow:hidden;display:flex}
#pChat.closed{display:none}
.mn-chat-toggle{position:absolute;top:8px;z-index:100;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);border:1px solid var(--mn-border);color:var(--mn-t2);font-size:10px;font-weight:500;padding:4px 10px;border-radius:12px;cursor:pointer;font-family:var(--mn-font);transition:all .12s}
.mn-chat-toggle:hover{background:rgba(0,0,0,0.8);color:var(--mn-t1)}
.mn-sel-summary{position:fixed;z-index:500;padding:6px 14px;border-radius:10px;background:rgba(0,0,0,0.88);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.1);color:var(--mn-t1);font-size:11px;font-weight:500;pointer-events:none;opacity:0;transform:translateY(4px);transition:opacity .15s,transform .15s;white-space:nowrap;letter-spacing:-0.01em}
.mn-sel-summary.visible{opacity:1;transform:translateY(0)}
.mn-chat-header{padding:12px 16px;border-bottom:1px solid var(--mn-border);display:flex;align-items:center;justify-content:space-between}
.mn-chat-header-title{font-size:13px;font-weight:600;color:var(--mn-t1);letter-spacing:-0.01em}
.mn-chat-header-actions{display:flex;gap:4px}
.mn-chat-header-btn{background:none;border:1px solid var(--mn-border);color:var(--mn-t3);font-size:10px;cursor:pointer;font-family:var(--mn-font);font-weight:500;padding:3px 10px;border-radius:6px;transition:all .12s}
.mn-chat-header-btn:hover{color:var(--mn-t1);border-color:rgba(255,255,255,0.15)}
.mn-chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px;scrollbar-width:none}
.mn-chat-messages::-webkit-scrollbar{display:none}
.mn-chat-empty{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:0;color:var(--mn-t3);font-size:11px;line-height:1.5}
/* Chat welcome */
.mn-chat-welcome{text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:5px;width:100%}
.mn-chat-welcome-count{font-size:13px;color:var(--mn-t2)}
.mn-chat-welcome-count strong{color:var(--mn-t1)}
.mn-chat-welcome-actions{margin-top:16px;justify-content:center}
#insightsPanel{padding:20px 24px;overflow-y:auto;align-items:center;justify-content:center}
/* Insight panel */
.mn-insight-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;width:100%;padding:20px 24px}
.mn-insight-canvas{width:100%!important;height:100%!important}
.mn-pie{width:min(100%,480px);aspect-ratio:1;border-radius:50%;position:relative;-webkit-mask:radial-gradient(circle,transparent 42%,black 42.5%);mask:radial-gradient(circle,transparent 42%,black 42.5%);animation:mn-pie-in 0.8s ease forwards;transform:scale(0.9);opacity:0}
@keyframes mn-pie-in{to{transform:scale(1);opacity:1}}
.mn-pie-legend{display:flex;flex-wrap:wrap;justify-content:center;gap:16px;margin-top:24px}
.mn-pie-legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--mn-t2)}
.mn-pie-legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.mn-pie-legend-pct{font-weight:600;color:var(--mn-t1);font-variant-numeric:tabular-nums;margin-left:2px}
/* Detail panel inline replacements */
.mn-det-hero-wrap{padding:16px 18px}
.mn-det-hero{font-size:36px;font-weight:600;letter-spacing:-0.03em;line-height:1;font-variant-numeric:tabular-nums}
.mn-det-hero-sub{font-size:12px;color:rgba(255,255,255,0.76);margin-top:10px;letter-spacing:-0.3px;text-transform:capitalize}
.mn-det-grid{padding:10px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;border-top:1px solid var(--mn-border);border-bottom:1px solid var(--mn-border)}
.mn-det-grid-cell{padding:12px 14px;text-align:center;background:rgba(255,255,255,0.015)}
.mn-det-grid-value{font-size:18px;font-weight:600;letter-spacing:-0.02em;font-variant-numeric:tabular-nums;color:var(--mn-t1)}
.mn-det-grid-label{font-size:10px;color:var(--mn-t3);margin-top:2px}
.mn-det-sel-grid{padding:12px 18px;border-bottom:1px solid var(--mn-border);display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:1px}
.mn-det-sel-cell{padding:10px 6px;text-align:center}
.mn-det-sel-value{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums}
.mn-det-sel-label{font-size:10px;color:var(--mn-t3);margin-top:1px;text-transform:uppercase;letter-spacing:0.05em;font-weight:600}
.mn-det-filter-bar{padding:10px 18px;display:flex;flex-wrap:wrap;gap:4px;border-bottom:1px solid var(--mn-border)}
.mn-det-filter-pill{height:22px;font-size:10px;padding:0 8px}
.mn-det-gender-bar{display:flex;height:6px;border-radius:3px;overflow:hidden;margin-bottom:6px}
.mn-det-gender-fill{background:rgba(255,255,255,0.15)}
.mn-det-gender-empty{flex:1;background:rgba(255,255,255,0.06)}
.mn-det-gender-labels{display:flex;justify-content:space-between;font-size:11px}
.mn-chat-msg{max-width:100%;font-size:13px;line-height:1.6;animation:mn-chat-in 0.25s ease;letter-spacing:-0.005em}
.mn-chat-msg-user{align-self:flex-end;max-width:85%;background:rgba(255,255,255,0.06);color:var(--mn-t1);padding:10px 14px;border-radius:18px 18px 4px 18px;font-weight:400}
.mn-chat-msg-ai{align-self:flex-start;color:var(--mn-t1);padding:4px 0}
.mn-chat-msg-ai strong{color:var(--mn-t1);font-weight:600}
.mn-chat-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.mn-chat-starters{display:flex;flex-direction:column;gap:6px;width:100%}
.mn-chat-input-area{padding:12px;border-top:1px solid var(--mn-border);display:flex;gap:8px;align-items:center}
.mn-chat-input{flex:1;background:rgba(255,255,255,0.03);border:1px solid var(--mn-border);border-radius:20px;padding:9px 16px;font-size:13px;color:var(--mn-t1);font-family:var(--mn-font);outline:none;transition:border-color .15s}
.mn-chat-input:focus{border-color:rgba(255,255,255,0.15)}
.mn-chat-input::placeholder{color:var(--mn-t3)}
.mn-chat-send{width:30px;height:30px;border-radius:50%;background:white;color:black;border:none;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .12s}
.mn-chat-send:hover{opacity:0.8}
.mn-chat-send:disabled{opacity:0.15;cursor:default}
.mn-chat-shimmer{background:linear-gradient(90deg,var(--mn-t3) 0%,var(--mn-t1) 50%,var(--mn-t3) 100%);background-size:200% auto;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:mn-shimmer-text 1.8s linear infinite;font-size:12px}
@keyframes mn-shimmer-text{0%{background-position:-200% center}100%{background-position:200% center}}
.mn-chat-dots{display:flex;gap:3px;padding:8px 0}
.mn-chat-dots span{width:4px;height:4px;border-radius:50%;background:var(--mn-t3)}
.mn-chat-dots span:nth-child(1){animation:dot-pulse 1s ease infinite 0ms}
.mn-chat-dots span:nth-child(2){animation:dot-pulse 1s ease infinite 150ms}
.mn-chat-dots span:nth-child(3){animation:dot-pulse 1s ease infinite 300ms}
@keyframes mn-chat-in{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes dot-pulse{0%,100%{opacity:0.15}50%{opacity:0.6}}
/* Progressive blur mask above input */
.mn-chat-messages{-webkit-mask-image:linear-gradient(to bottom,transparent 0%,black 3%,black 90%,transparent 100%);mask-image:linear-gradient(to bottom,transparent 0%,black 3%,black 90%,transparent 100%);padding-top:24px;padding-bottom:24px}
/* Blur-in for AI messages */
.mn-chat-msg-ai{animation:mn-blur-in 0.4s cubic-bezier(0.22,1,0.36,1)}
@keyframes mn-blur-in{from{opacity:0;filter:blur(4px);transform:translateY(8px)}to{opacity:1;filter:blur(0);transform:translateY(0)}}
.mn-chat-msg-user{animation:mn-user-in 0.2s ease}
@keyframes mn-user-in{from{opacity:0;transform:scale(0.96) translateY(4px)}to{opacity:1;transform:scale(1) translateY(0)}}
/* AI message sections */
.mn-chat-section{margin-top:8px;padding:10px 12px;border-radius:8px;background:rgba(255,255,255,0.02);border:1px solid var(--mn-border)}
.mn-chat-section-title{font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:var(--mn-t3);font-weight:600;margin-bottom:6px}
.mn-chat-stat{display:inline-flex;align-items:baseline;gap:4px;margin-right:14px}
.mn-chat-stat-value{font-size:16px;font-weight:600;color:var(--mn-t1);letter-spacing:-0.02em;font-variant-numeric:tabular-nums}
.mn-chat-stat-label{font-size:10px;color:var(--mn-t3)}
/* Consistent pill for all action buttons */
.mn-chat-action-btn,.mn-chat-starter{font-size:12px;padding:8px 14px;border-radius:10px;border:1px solid var(--mn-border);background:transparent;color:var(--mn-t2);cursor:pointer;font-family:var(--mn-font);font-weight:400;transition:all .15s;letter-spacing:-0.01em;line-height:1.3;text-align:left}
.mn-chat-action-btn:hover,.mn-chat-starter:hover{background:rgba(255,255,255,0.03);border-color:rgba(255,255,255,0.12);color:var(--mn-t1)}
.mn-chat-action-btn.done{border-color:rgba(255,255,255,0.04);color:var(--mn-t3);pointer-events:none;background:transparent}
/* ═══ MOBILE ═══ */
@media(max-width:768px){
  .mn-workspace-shell{inset:0;padding:0!important;gap:0}
  .mn-workspace-main{flex-direction:column;gap:0;overflow-y:auto;overflow-x:hidden}
  #pDet{display:none!important}
  #pChat{display:none!important}
  .mn-chat-toggle-btn{display:none!important}
  #pProf{position:fixed!important;inset:0!important;z-index:200!important;flex:none!important;display:none;border-radius:0!important;border:none!important;background:var(--mn-bg)!important}
  #pProf.mn-mobile-open{display:flex!important}
  #pTbl{flex:1!important;border-radius:0;border:none;min-height:0}
  .mn-workspace-slider{border-radius:0;border-left:0;border-right:0;height:auto;padding:8px 12px;gap:10px}
  .mn-workspace-slider-left{min-width:auto}
  .mn-workspace-slider-track-area{height:24px}
  .mn-workspace-slider-stats{gap:6px;flex-wrap:wrap}
  .mn-workspace-slider-stat-value{font-size:12px}
  .mn-workspace-slider-stat-label{font-size:8px}
  .mn-workspace-floating-toolbar{gap:6px;padding:8px 12px;overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:nowrap}
  .mn-workspace-floating-toolbar .mn-workspace-slider-mode{flex-shrink:0}
  .mn-workspace-floating-toolbar .mn-toolbar-action{flex-shrink:0}
  .mn-workspace-search{padding:8px 12px!important}
  .mn-workspace-table-td{padding:6px 10px;font-size:12px}
  .mn-workspace-table-th{padding:6px 10px}
  .mn-workspace-table-td:nth-child(3),.mn-workspace-table-td:nth-child(4),.mn-workspace-table-td:nth-child(5),.mn-workspace-table-th:nth-child(3),.mn-workspace-table-th:nth-child(4),.mn-workspace-table-th:nth-child(5){display:none}
  .mn-workspace-table-person{gap:8px}
  .mn-workspace-table-avatar{width:28px;height:28px}

function animNum(id,from,to){

  var el=document.getElementById(id),start=performance.now(),dur=180;
  function tick(now){var t=Math.min((now-start)/dur,1);t=t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;

    var el = document.querySelector(e.data.selector);
    if (el) el.click();
  }
  if (e.data.type === 'minerva-export') {
    doExport();
  }
  if (e.data.type === 'minerva-init') {
    if (e.data.mode) setMode(e.data.mode.charAt(0).toUpperCase() + e.data.mode.slice(1));
    if (e.data.embedded) {
      document.body.classList.add('embedded');
      // Start guided tour after a short delay
      setTimeout(function(){if(!localStorage.getItem('mn-tour-seen')){startTour();localStorage.setItem('mn-tour-seen','1')}},2000);

function formatAIText(text){
  // Bold
  text=text.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  var lines=text.split('\n').filter(function(l){return l.trim()});
  var html='',inStats=false,statHtml='';
  lines.forEach(function(line){
    // Detect stat lines: patterns like "Score: 84" or "84% reachable" at start
    var statMatch=line.match(/^[-•]?\s*(.+?):\s*([\$]?[\d,.]+[%xK]?)\b/);
    if(statMatch && line.length < 60){
      if(!inStats){inStats=true;statHtml='<div class="mn-chat-section"><div class="mn-chat-section-title">Key Metrics</div>'}
      statHtml+='<span class="mn-chat-stat"><span class="mn-chat-stat-value">'+statMatch[2]+'</span><span class="mn-chat-stat-label">'+statMatch[1]+'</span></span>';
      return
    }
    if(inStats){html+=statHtml+'</div>';inStats=false;statHtml=''}
    // Bullet lists
    if(line.match(/^\s*[-•]\s/)){
      html+='<div style="display:flex;gap:6px;margin:2px 0"><span style="color:var(--mn-t3);flex-shrink:0">·</span><span>'+line.replace(/^\s*[-•]\s/,'')+'</span></div>';
      return
    }
    html+='<p style="margin:4px 0">'+line+'</p>'
  });
  if(inStats)html+=statHtml+'</div>';
  return html
}

/* Action button icons */
function actionIcon(a){
  var icons={setMode:'◎ ',toggleFilter:'⫘ ',setRange:'⟷ ',clearFilters:'✕ ',sort:'↕ ',openProfile:'◔ ',export:'↧ ',highlight:'◈ ',filter:'⫘ ',compare:'⟺ ',clearDynFilters:'✕ '};
  return icons[a.type]||'✦ '
}

/* Parse [ACTION] blocks */
function parseAIActions(text){
  var actions=[],clean=text;
  var re=/\[ACTION\]([\s\S]*?)\[\/ACTION\]/g,m;
  while((m=re.exec(text))!==null){
    try{var a=JSON.parse(m[1].trim());actions.push(a)}catch(e){}
    clean=clean.replace(m[0],'')
  }
  return{text:clean.trim(),actions:actions}
}

/* Action labels */
function actionLabel(a){
  if(a.type==='setMode')return'Switch to '+a.value;
  if(a.type==='toggleFilter'){var m={ownerOnly:'Homeowners',incomeMin:'$250K+',emailOnly:'Email only'};return(m[a.filter]||a.filter)}
  if(a.type==='setRange')return'Score '+a.lo+'\u2013'+a.hi;
  if(a.type==='clearFilters')return'Clear filters';
  if(a.type==='sort')return'Sort by '+a.key;
  if(a.type==='openProfile'){var p;PP.forEach(function(x){if(x.id===a.id)p=x});return'Open '+(p?p.name:'profile')}
  if(a.type==='scrollTo'){var p2;PP.forEach(function(x){if(x.id===a.id)p2=x});return'Scroll to '+(p2?p2.name:'profile')}
  if(a.type==='export')return'Export CSV';
  if(a.type==='highlight')return'Highlight '+(a.ids?a.ids.length:0)+' profiles';
  if(a.type==='filter')return a.field+' '+a.op+' '+a.value;
  if(a.type==='showChart')return'Show '+(a.chart||'score')+' chart';
  if(a.type==='clearDynFilters')return'Clear dynamic filters';
  if(a.type==='compare'){var cp1,cp2;PP.forEach(function(x){if(x.id===a.id1)cp1=x;if(x.id===a.id2)cp2=x});return'Compare '+(cp1?cp1.name:'')+ ' vs '+(cp2?cp2.name:'')}
  return a.type
}

/* Execute action */
function execChatAction(btnId){
  var a=chatActions[btnId];if(!a)return;
  var btn=document.getElementById(btnId);
  if(btn){btn.classList.add('done');btn.textContent='\u2713 '+btn.textContent}
  if(a.type==='setMode'){setMode(a.value);toast('Mode: '+a.value)}
  else if(a.type==='toggleFilter'){togFilt(a.filter);toast('Filter toggled')}
  else if(a.type==='setRange'){sLo=Math.max(0,Math.min(99,a.lo));sHi=Math.max(sLo,Math.min(99,a.hi));usv();ren();toast('Range: '+sLo+'\u2013'+sHi)}
  else if(a.type==='clearFilters'){clearFilters()}
  else if(a.type==='sort'){doSort(a.key)}
  else if(a.type==='openProfile'){opf(a.id);toast('Opened profile')}
  else if(a.type==='scrollTo'){
    var row=document.querySelector('[data-pid="'+a.id+'"]');
    if(row){row.scrollIntoView({behavior:'smooth',block:'center'});row.style.background='rgba(255,255,255,0.08)';setTimeout(function(){row.style.background=''},2000)}
    toast('Scrolled to profile')
  }
  else if(a.type==='export'){doExport();toast('Exported CSV')}
  else if(a.type==='highlight'&&a.ids){
    a.ids.forEach(function(id){var row=document.querySelector('[data-pid="'+id+'"]');if(row){row.style.background='rgba(255,255,255,0.08)';setTimeout(function(){row.style.background=''},4000)}});
    toast('Highlighted '+a.ids.length+' profiles')
  }
  else if(a.type==='filter'){addDynFilter(a.field,a.op,a.value)}
  else if(a.type==='showChart'){var chart=a.chart==='cities'?renderCityChart():renderScoreChart();addChatMsg('ai',chart)}
  else if(a.type==='clearDynFilters'){clearDynFilters()}
  else if(a.type==='compare'){openCompare(a.id1,a.id2,a.verdict||'')}
}

/* Clear chat */
function clearChat(){
  chatActions={};chatHistory=[];dynamicFilters=[];generateWelcome()
}

/* ═══ COMPARISON MODAL ═══ */
function openCompare(id1,id2,verdict){
  var p1,p2;PP.forEach(function(p){if(p.id===id1)p1=p;if(p.id===id2)p2=p});
  if(!p1||!p2){toast('Profiles not found');return}
  var fields=[['Score','score'],['Age','age'],['Income','income'],['City','city'],['Homeowner','owner'],['Gender','gender'],['Wealth','wealth']];
  function col(p){
    var h='<div class="mn-compare-modal-col">';
    h+='<div class="mn-compare-modal-col-name">'+p.name+'<\/div>';
    h+='<div class="mn-compare-modal-col-sub">'+p.title+' \u00b7 '+p.city+'<\/div>';
    fields.forEach(function(f){
      var v=p[f[1]];if(typeof v==='boolean')v=v?'Yes':'No';
      h+='<div class="mn-compare-modal-col-field"><span class="mn-compare-modal-col-field-key">'+f[0]+'<\/span><span class="mn-compare-modal-col-field-value">'+v+'<\/span><\/div>';
    });
    return h+'<\/div>'
  }
  var html='<div class="mn-compare-modal-title">Profile Comparison<\/div>';
  html+='<div class="mn-compare-modal-grid">'+col(p1)+col(p2)+'<\/div>';
  if(verdict)html+='<div class="mn-compare-modal-verdict">'+verdict.replace(/\*\*([^*]+)\*\*/g,'<strong>$1<\/strong>')+'<\/div>';
  document.getElementById('compareContent').innerHTML=html;
  document.getElementById('compareModal').classList.add('open')
}
function closeCompare(){document.getElementById('compareModal').classList.remove('open')}

/* Multi-select hover summary */
function updateSelSummary(e){
  var el=document.getElementById('selSummary');
  if(selMulti.length<2){el.classList.remove('visible');return}
  var sel=PP.filter(function(p){return selMulti.indexOf(p.id)>=0});
  var ss=0,sa=0,oc=0,ec=0;
  sel.forEach(function(p){ss+=p.score;sa+=p.age;if(p.owner)oc++;if(p.email)ec++});
  var avg=(ss/sel.length).toFixed(1);
  var aag=Math.round(sa/sel.length);
  el.textContent=sel.length+' selected \u00b7 Avg score '+avg+' \u00b7 Avg age '+aag+' \u00b7 '+oc+' homeowners \u00b7 '+ec+' email';
  el.style.left=(e?e.clientX+12:100)+'px';
  el.style.top=(e?(e.clientY-40):100)+'px';
  el.classList.add('visible')
}

/* Init welcome on first render */
setTimeout(function(){generateWelcome()},800);
setTimeout(function(){if(!document.body.classList.contains('embedded')&&!localStorage.getItem('mn-tour-seen')){startTour();localStorage.setItem('mn-tour-seen','1')}},2000);
