<!DOCTYPE html>
<html lang="en" class="mn-workspace-html">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Minerva — Audience Scoring</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --mn-bg:#000;
  --mn-sf:rgba(255,255,255,0.04);
  --mn-border:rgba(255,255,255,0.06);
  --mn-border-h:rgba(255,255,255,0.12);
  --mn-t1:rgba(255,255,255,0.90);
  --mn-t2:rgba(255,255,255,0.45);
  --mn-t3:rgba(255,255,255,0.22);
  --mn-white:#fff;
  --mn-r:10px;
  --mn-g:10px;
  --mn-font:'Overused Grotesk',ui-sans-serif,system-ui,sans-serif;
}
html.mn-workspace-html,body.mn-workspace-body{height:100%;overflow:hidden;background:var(--mn-bg);color:var(--mn-t1);font-family:var(--mn-font);font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased;margin:0;padding:0}
::selection{background:rgba(255,255,255,0.15)}

.mn-workspace-shell{position:fixed;inset:var(--mn-g);display:flex;flex-direction:column;gap:var(--mn-g)}

/* ═══ TOPBAR ═══ */
.mn-workspace-topbar{display:flex;align-items:center;justify-content:space-between;padding:0 14px;height:40px;background:var(--mn-sf);border:1px solid var(--mn-border);border-radius:var(--mn-r);flex-shrink:0}
.mn-workspace-topbar-left{display:flex;align-items:center;gap:10px}
.mn-workspace-topbar-logo{display:flex;align-items:center;gap:6px;font-weight:600;font-size:13px;letter-spacing:-0.02em}
.mn-workspace-topbar-logo-icon{width:14px;height:14px;opacity:0.4}
.mn-workspace-topbar-separator{width:1px;height:14px;background:var(--mn-border)}
.mn-workspace-topbar-context{font-size:11px;color:var(--mn-t3)}
.mn-workspace-topbar-context-name{color:var(--mn-t2)}
.mn-workspace-topbar-right{display:flex;align-items:center;gap:5px}
.mn-workspace-topbar-btn{height:26px;padding:0 10px;border-radius:5px;border:1px solid var(--mn-border);background:0;color:var(--mn-t2);font-size:10px;font-weight:500;cursor:pointer;transition:all .12s;font-family:var(--mn-font);display:inline-flex;align-items:center;gap:4px}
.mn-workspace-topbar-btn:hover{border-color:var(--mn-border-h);color:var(--mn-t1)}
.mn-workspace-topbar-btn-on{border-color:rgba(255,255,255,0.2);color:var(--mn-t1);background:rgba(255,255,255,0.04)}
.mn-workspace-topbar-save{height:26px;padding:0 12px;border-radius:5px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.06);color:var(--mn-white);font-size:10px;font-weight:600;cursor:pointer;font-family:var(--mn-font);display:inline-flex;align-items:center;gap:4px;transition:all .12s}
.mn-workspace-topbar-save:hover{background:rgba(255,255,255,0.10)}
.mn-workspace-topbar-segments{position:relative}
.mn-workspace-topbar-segments-menu{position:absolute;top:32px;right:0;background:var(--mn-sf);border:1px solid var(--mn-border);border-radius:6px;padding:4px;min-width:200px;z-index:50;display:none}
.mn-workspace-topbar-segments-menu-open{display:block}
.mn-workspace-topbar-segments-item{display:block;width:100%;text-align:left;padding:6px 10px;border:0;background:0;color:var(--mn-t2);font-size:11px;font-family:var(--mn-font);cursor:pointer;border-radius:4px;transition:all .12s}
.mn-workspace-topbar-segments-item:hover{background:rgba(255,255,255,0.04);color:var(--mn-t1)}
.mn-workspace-topbar-segments-empty{padding:8px 10px;color:var(--mn-t3);font-size:10px}

/* ═══ MAIN ═══ */
.mn-workspace-main{flex:1;display:flex;gap:var(--mn-g);min-height:0;overflow:hidden}

/* ═══ PANEL ═══ */
.mn-workspace-panel{background:var(--mn-sf);border:1px solid var(--mn-border);border-radius:var(--mn-r);display:flex;flex-direction:column;overflow:hidden;min-width:0;transition:opacity .2s,flex .25s ease}
.mn-workspace-panel-header{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-bottom:1px solid var(--mn-border);flex-shrink:0}
.mn-workspace-panel-header-title{font-size:10px;font-weight:600;color:var(--mn-t3);text-transform:uppercase;letter-spacing:0.06em}
.mn-workspace-panel-header-meta{font-size:10px;color:var(--mn-t3);font-variant-numeric:tabular-nums}
.mn-workspace-panel-body{flex:1;overflow-y:auto;overflow-x:hidden}
.mn-workspace-panel-body::-webkit-scrollbar{width:3px}
.mn-workspace-panel-body::-webkit-scrollbar-track{background:0}
.mn-workspace-panel-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.04);border-radius:2px}

/* ═══ SLIDER ═══ */
.mn-workspace-slider{background:var(--mn-sf);border:1px solid var(--mn-border);border-radius:var(--mn-r);padding:6px 14px;display:flex;align-items:center;gap:16px;flex-shrink:0;height:44px}
.mn-workspace-slider-left{min-width:80px}
.mn-workspace-slider-title{font-size:9px;color:var(--mn-t3);text-transform:uppercase;letter-spacing:0.06em;font-weight:600}
.mn-workspace-slider-range-value{font-size:16px;font-weight:700;letter-spacing:-0.03em;font-variant-numeric:tabular-nums}
.mn-workspace-slider-track-area{flex:1;position:relative;height:28px;display:flex;align-items:center}
.mn-workspace-slider-track{position:absolute;left:0;right:0;height:2px;background:rgba(255,255,255,0.04);border-radius:1px}
.mn-workspace-slider-fill{position:absolute;height:2px;background:var(--mn-white);border-radius:1px;opacity:0.5;transition:left 25ms,width 25ms}
.mn-workspace-slider-histogram{display:none}
.mn-workspace-slider-hist-bar{flex:1;border-radius:1px 1px 0 0;background:rgba(255,255,255,0.025);transition:background .12s;min-width:1px}
.mn-workspace-slider-hist-bar-on{background:rgba(255,255,255,0.12)}
.mn-workspace-slider-thumb{position:absolute;width:14px;height:14px;border-radius:50%;background:var(--mn-white);cursor:grab;transform:translateX(-50%);z-index:3;transition:box-shadow .1s,transform .06s}
.mn-workspace-slider-thumb:hover{box-shadow:0 0 0 4px rgba(255,255,255,0.1);transform:translateX(-50%) scale(1.1)}
.mn-workspace-slider-thumb:active{cursor:grabbing;box-shadow:0 0 0 6px rgba(255,255,255,0.12)}
.mn-workspace-slider-stats{display:none}
.mn-workspace-slider-stat{text-align:center;min-width:44px}
.mn-workspace-slider-stat-value{font-size:13px;font-weight:700;letter-spacing:-0.02em;font-variant-numeric:tabular-nums}
.mn-workspace-slider-stat-label{font-size:8px;color:var(--mn-t3);text-transform:uppercase;letter-spacing:0.05em;font-weight:600}

/* ═══ TABLE ═══ */
.mn-workspace-search{padding:7px 14px;border-bottom:1px solid var(--mn-border);position:relative}
.mn-workspace-search-icon{position:absolute;left:21px;top:50%;transform:translateY(-50%);color:var(--mn-t3);width:11px;height:11px;pointer-events:none}
.mn-workspace-search-input{width:100%;background:rgba(255,255,255,0.02);border:1px solid transparent;border-radius:5px;padding:5px 7px 5px 26px;color:var(--mn-t1);font-size:11px;font-family:var(--mn-font);outline:0;transition:border-color .15s}
.mn-workspace-search-input:focus{border-color:rgba(255,255,255,0.12)}
.mn-workspace-search-input::placeholder{color:var(--mn-t3)}
.mn-workspace-table{width:100%;border-collapse:collapse}
.mn-workspace-table-thead{position:sticky;top:0;z-index:1}
.mn-workspace-table-th{padding:5px 10px;text-align:left;font-size:9px;font-weight:600;color:var(--mn-t3);text-transform:uppercase;letter-spacing:0.05em;background:var(--mn-sf);border-bottom:1px solid var(--mn-border);white-space:nowrap;cursor:pointer;user-select:none;transition:color .12s}
.mn-workspace-table-th:hover{color:var(--mn-t2)}
.mn-workspace-table-th-active{color:var(--mn-t1)}
.mn-workspace-table-th-arrow{font-size:8px;margin-left:2px;opacity:0.4}
.mn-workspace-table-row{border-bottom:1px solid rgba(255,255,255,0.02);cursor:pointer;transition:background .12s}
.mn-workspace-table-row:hover{background:rgba(255,255,255,0.02)}
.mn-workspace-table-row-selected{background:rgba(255,255,255,0.06) !important;box-shadow:inset 2px 0 0 rgba(255,255,255,0.35)}
.mn-workspace-table-td{padding:5px 10px;font-size:11px;white-space:nowrap;vertical-align:middle;color:var(--mn-t2)}
.mn-workspace-table-person{display:flex;align-items:center;gap:8px}
.mn-workspace-table-avatar{width:24px;height:24px;border-radius:50%;object-fit:cover;background:rgba(255,255,255,0.03);flex-shrink:0}
.mn-workspace-table-name{font-weight:500;color:var(--mn-t1);font-size:11px}
.mn-workspace-table-subtitle{font-size:9px;color:var(--mn-t3)}
.mn-workspace-score-badge{display:inline-flex;align-items:center;justify-content:center;min-width:24px;height:17px;border-radius:3px;font-size:10px;font-weight:700;font-variant-numeric:tabular-nums;padding:0 3px;background:rgba(255,255,255,0.04);color:var(--mn-t1)}
.mn-workspace-score-badge-high{background:rgba(255,255,255,0.10);color:var(--mn-white)}
.mn-workspace-channel-dot{display:inline-block;width:4px;height:4px;border-radius:50%;margin-right:3px}
.mn-workspace-channel-on{background:var(--mn-white);opacity:0.6}
.mn-workspace-channel-off{background:rgba(255,255,255,0.06)}
.mn-workspace-table-overflow{text-align:center;color:var(--mn-t3);padding:8px;font-size:10px}
.mn-workspace-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;color:var(--mn-t3);font-size:11px;gap:6px}

/* ═══ DETAIL ═══ */
.mn-workspace-detail-section{padding:12px 14px;border-bottom:1px solid var(--mn-border)}
.mn-workspace-detail-section:last-child{border-bottom:0}
.mn-workspace-detail-label{font-size:9px;font-weight:600;color:var(--mn-t3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px}
.mn-workspace-detail-hero{font-size:26px;font-weight:700;letter-spacing:-0.03em;line-height:1;margin-bottom:2px;transition:opacity .15s}
.mn-workspace-detail-hero-sub{font-size:11px;color:var(--mn-t3)}
.mn-workspace-detail-metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.mn-workspace-detail-metric{background:rgba(255,255,255,0.015);border:1px solid var(--mn-border);border-radius:6px;padding:7px 9px}
.mn-workspace-detail-metric-label{font-size:8px;color:var(--mn-t3);font-weight:600;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:1px}
.mn-workspace-detail-metric-value{font-size:14px;font-weight:700;letter-spacing:-0.02em;font-variant-numeric:tabular-nums;transition:opacity .12s}
/* Multi-select */
.mn-workspace-select-bar{display:flex;align-items:center;gap:8px;padding:6px 14px;border-bottom:1px solid var(--mn-border);font-size:10px;color:var(--mn-t2);background:rgba(255,255,255,0.02)}
.mn-workspace-select-bar-count{font-weight:600;color:var(--mn-t1)}
.mn-workspace-select-bar-actions{margin-left:auto;display:flex;gap:3px}
.mn-workspace-detail-narrative{font-size:11px;line-height:1.7;color:var(--mn-t2)}
.mn-workspace-detail-narrative b{color:var(--mn-t1);font-weight:600}
.mn-workspace-delta-row{display:flex;align-items:center;gap:5px;margin-bottom:4px}
.mn-workspace-delta-label{width:72px;color:var(--mn-t2);text-align:right;flex-shrink:0;font-size:10px}
.mn-workspace-delta-track{flex:1;height:3px;background:rgba(255,255,255,0.02);border-radius:2px;overflow:hidden}
.mn-workspace-delta-fill{height:100%;border-radius:2px;transition:width .3s ease}
.mn-workspace-delta-fill-pos{background:var(--mn-white);opacity:0.35}
.mn-workspace-delta-fill-neg{background:var(--mn-white);opacity:0.15}
.mn-workspace-delta-value{width:46px;text-align:right;font-weight:600;font-variant-numeric:tabular-nums;font-size:10px;color:var(--mn-t2)}
.mn-workspace-dist-row{display:flex;align-items:center;gap:5px;margin-bottom:4px}
.mn-workspace-dist-label{font-size:10px;color:var(--mn-t2);width:56px;flex-shrink:0;text-align:right}
.mn-workspace-dist-track{flex:1;height:3px;background:rgba(255,255,255,0.02);border-radius:2px;overflow:hidden}
.mn-workspace-dist-fill{height:100%;border-radius:2px;background:var(--mn-white);opacity:0.25;transition:width .3s ease}
.mn-workspace-dist-value{font-size:10px;color:var(--mn-t3);width:30px;font-variant-numeric:tabular-nums;text-align:right}
.mn-workspace-reach-row{display:flex;align-items:center;gap:6px;padding:3px 0}
.mn-workspace-reach-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;background:var(--mn-white)}
.mn-workspace-reach-dot-low{opacity:0.15}
.mn-workspace-reach-dot-mid{opacity:0.35}
.mn-workspace-reach-dot-high{opacity:0.7}
.mn-workspace-reach-name{font-size:11px;color:var(--mn-t2);flex:1}
.mn-workspace-reach-count{font-size:11px;font-weight:600;font-variant-numeric:tabular-nums}
.mn-workspace-reach-pct{font-size:10px;color:var(--mn-t3);width:36px;text-align:right}
.mn-workspace-spark-grid{display:flex;gap:5px}
.mn-workspace-spark-card{flex:1;background:rgba(255,255,255,0.012);border:1px solid var(--mn-border);border-radius:6px;padding:6px 6px 3px}
.mn-workspace-spark-title{font-size:8px;color:var(--mn-t3);font-weight:600;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:3px;display:block}
.mn-workspace-spark-bars{display:flex;align-items:flex-end;gap:1px;height:22px}
.mn-workspace-spark-bar{flex:1;border-radius:1px 1px 0 0;transition:height .3s ease;min-width:1px}
.mn-workspace-spark-bar-on{background:rgba(255,255,255,0.3)}
.mn-workspace-spark-bar-off{background:rgba(255,255,255,0.03)}
.mn-workspace-spark-axis{font-size:7px;color:var(--mn-t3);text-align:center;margin-top:1px;opacity:0.4}
.mn-workspace-action-row{display:flex;gap:4px;flex-wrap:wrap}
.mn-workspace-action-btn{height:24px;padding:0 9px;border-radius:5px;border:1px solid var(--mn-border);background:0;color:var(--mn-t2);font-size:10px;font-weight:500;cursor:pointer;transition:all .12s;font-family:var(--mn-font);display:inline-flex;align-items:center}
.mn-workspace-action-btn:hover{border-color:var(--mn-border-h);color:var(--mn-t1)}
.mn-workspace-action-btn-primary{border-color:rgba(255,255,255,0.18);color:var(--mn-t1);background:rgba(255,255,255,0.04)}
.mn-workspace-action-btn-primary:hover{background:rgba(255,255,255,0.08)}

/* ═══ INTELLIGENCE CARD ═══ */
.mn-workspace-intel{padding:14px;display:flex;flex-direction:column;height:100%}
.mn-workspace-intel-body{flex:1;display:flex;flex-direction:column;justify-content:center}
.mn-workspace-intel-verdict{font-size:13px;font-weight:600;letter-spacing:-0.01em;line-height:1.5;color:var(--mn-t1);margin-bottom:8px;animation:mn-in .25s ease both}
.mn-workspace-intel-detail{font-size:11px;line-height:1.7;color:var(--mn-t2);margin-bottom:12px;animation:mn-in .3s ease .05s both}
.mn-workspace-intel-detail b{color:var(--mn-t1);font-weight:600}
.mn-workspace-intel-confidence{font-size:9px;color:var(--mn-t3);text-transform:uppercase;letter-spacing:0.06em;font-weight:600;margin-bottom:12px}
.mn-workspace-intel-refresh{height:24px;padding:0 10px;border-radius:5px;border:1px solid var(--mn-border);background:0;color:var(--mn-t2);font-size:10px;font-weight:500;cursor:pointer;transition:all .12s;font-family:var(--mn-font);display:inline-flex;align-items:center;gap:4px;align-self:flex-start}
.mn-workspace-intel-refresh:hover{border-color:var(--mn-border-h);color:var(--mn-t1)}
.mn-workspace-intel-filters{display:flex;flex-wrap:wrap;gap:3px;margin-top:auto;padding-top:10px;border-top:1px solid var(--mn-border)}
.mn-workspace-intel-filter{height:22px;padding:0 8px;border-radius:11px;border:1px solid var(--mn-border);background:0;color:var(--mn-t3);font-size:9px;cursor:pointer;transition:all .12s;font-family:var(--mn-font);display:inline-flex;align-items:center}
.mn-workspace-intel-filter:hover{border-color:var(--mn-border-h);color:var(--mn-t1)}
.mn-workspace-intel-filter-on{border-color:rgba(255,255,255,0.2);color:var(--mn-t1);background:rgba(255,255,255,0.04)}

/* ═══ PROFILE (inline column) ═══ */
.mn-workspace-profile-hero{padding:12px 14px;border-bottom:1px solid var(--mn-border)}
.mn-workspace-profile-identity{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.mn-workspace-profile-avatar{width:36px;height:36px;border-radius:50%;object-fit:cover}
.mn-workspace-profile-name{font-size:14px;font-weight:600;letter-spacing:-0.02em}
.mn-workspace-profile-role{font-size:10px;color:var(--mn-t3)}
.mn-workspace-profile-score-area{display:flex;align-items:center;gap:10px}
.mn-workspace-profile-score-number{font-size:28px;font-weight:700;letter-spacing:-0.04em;line-height:1}
.mn-workspace-profile-score-context{font-size:11px;font-weight:500}
.mn-workspace-profile-score-desc{font-size:9px;color:var(--mn-t3)}
.mn-workspace-profile-section{padding:12px 14px;border-bottom:1px solid var(--mn-border)}
.mn-workspace-profile-section:last-child{border-bottom:0}
.mn-workspace-profile-field{display:flex;justify-content:space-between;padding:2px 0;font-size:11px}
.mn-workspace-profile-field-key{color:var(--mn-t3)}
.mn-workspace-profile-field-value{color:var(--mn-t1);font-weight:500}
.mn-workspace-profile-insight{font-size:11px;line-height:1.7;color:var(--mn-t2);background:rgba(255,255,255,0.02);border:1px solid var(--mn-border);border-radius:6px;padding:9px 11px}
.mn-workspace-tag{display:inline-block;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:500;background:rgba(255,255,255,0.03);border:1px solid var(--mn-border);color:var(--mn-t2);margin:1px}
.mn-workspace-tag-wrap{display:flex;flex-wrap:wrap;gap:2px}
.mn-workspace-profile-label{font-size:9px;font-weight:600;color:var(--mn-t3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px}

/* ═══ MODAL ═══ */
.mn-workspace-modal{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .15s}
.mn-workspace-modal-open{opacity:1;pointer-events:auto}
.mn-workspace-modal-box{background:var(--mn-sf);border:1px solid var(--mn-border);border-radius:var(--mn-r);padding:18px;width:300px;max-width:90vw;transform:translateY(8px);transition:transform .2s cubic-bezier(0.22,1,0.36,1)}
.mn-workspace-modal-open .mn-workspace-modal-box{transform:translateY(0)}
.mn-workspace-modal-title{font-size:13px;font-weight:600;margin-bottom:10px}
.mn-workspace-modal-input{width:100%;background:rgba(255,255,255,0.02);border:1px solid var(--mn-border);border-radius:5px;padding:7px 9px;color:var(--mn-t1);font-size:11px;font-family:var(--mn-font);outline:0;margin-bottom:12px}
.mn-workspace-modal-input:focus{border-color:rgba(255,255,255,0.12)}
.mn-workspace-modal-footer{display:flex;gap:5px;justify-content:flex-end}

/* ═══ TOAST ═══ */
.mn-workspace-toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--mn-sf);border:1px solid rgba(255,255,255,0.12);border-radius:7px;padding:7px 14px;font-size:11px;color:var(--mn-t1);font-weight:500;z-index:300;opacity:0;pointer-events:none;transition:all .25s cubic-bezier(0.22,1,0.36,1)}
.mn-workspace-toast-show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Modes */
.mn-workspace-slider-modes{display:none}
.mn-workspace-slider-mode{height:20px;padding:0 7px;border-radius:10px;border:1px solid var(--mn-border);background:0;color:var(--mn-t3);font-size:9px;font-weight:500;cursor:pointer;transition:all .12s;font-family:var(--mn-font);display:inline-flex;align-items:center}
.mn-workspace-slider-mode:hover{border-color:var(--mn-border-h);color:var(--mn-t2)}
.mn-workspace-slider-mode-on{border-color:rgba(255,255,255,0.18);color:var(--mn-t1);background:rgba(255,255,255,0.04)}
.mn-workspace-slider-mode-desc{color:var(--mn-t3);font-weight:400;margin-left:2px}
/* Geo */
.mn-workspace-geo-row{display:flex;align-items:center;gap:5px;padding:2px 0;font-size:10px}
.mn-workspace-geo-name{color:var(--mn-t2);flex:1}
.mn-workspace-geo-ct{color:var(--mn-t1);font-weight:600;font-variant-numeric:tabular-nums;min-width:24px;text-align:right}
.mn-workspace-geo-bar{width:40px;height:3px;background:rgba(255,255,255,0.02);border-radius:2px;overflow:hidden}
.mn-workspace-geo-fill{height:100%;background:var(--mn-white);opacity:0.2;border-radius:2px;transition:width .3s ease}

/* Chart */
.mn-workspace-chart-wrap{position:relative;height:90px;margin:4px 0}
/* News */
.mn-workspace-news-item{padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.02)}
.mn-workspace-news-item:last-child{border-bottom:0}
.mn-workspace-news-title{font-size:10px;color:var(--mn-t1);font-weight:500;line-height:1.4}
.mn-workspace-news-meta{font-size:8px;color:var(--mn-t3);margin-top:1px}
.mn-workspace-profile-close{margin-left:auto;height:20px;padding:0 6px;font-size:9px}
/* Entrance */
@keyframes mn-in{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.mn-workspace-in{opacity:0;animation:mn-in .3s ease forwards}

/* ═══ FLOATING TOOLBAR ═══ */
.mn-workspace-floating-toolbar{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);display:flex;gap:3px;padding:4px;background:rgba(13,13,15,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.08);border-radius:14px;z-index:20;animation:mn-float-in .4s cubic-bezier(0.22,1,0.36,1) both}

.mn-workspace-floating-toolbar .mn-workspace-slider-mode{border-radius:10px;height:28px;padding:0 12px;font-size:10px}
.mn-workspace-floating-toolbar .mn-workspace-slider-mode-desc{display:none}

/* ═══ PANEL ANIMATIONS ═══ */
.mn-workspace-panel{opacity:0;animation:mn-panel-in .35s cubic-bezier(0.22,1,0.36,1) forwards}
@keyframes mn-panel-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
#pDet{animation-delay:.05s}
#pTbl{animation-delay:.1s}
#pIntel{animation-delay:.15s}
#pProf{animation:none;opacity:1;transition:opacity .2s ease,transform .2s ease}

/* ═══ SLIDER STATS INSIDE DETAIL ═══ */
.mn-workspace-detail-stats{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:5px;margin-top:8px}
.mn-workspace-detail-stat-cell{background:rgba(255,255,255,0.015);border:1px solid var(--mn-border);border-radius:6px;padding:7px 9px;text-align:center}
.mn-workspace-detail-stat-cell-value{font-size:14px;font-weight:700;letter-spacing:-0.02em;font-variant-numeric:tabular-nums}
.mn-workspace-detail-stat-cell-label{font-size:8px;color:var(--mn-t3);font-weight:600;text-transform:uppercase;letter-spacing:0.06em;margin-top:1px}

/* ═══ DRAG SELECT ═══ */
.mn-workspace-table-row-dragging{background:rgba(255,255,255,0.04) !important}
.mn-workspace-table-row.mn-drag-highlight{box-shadow:inset 2px 0 0 rgba(255,255,255,0.2);background:rgba(255,255,255,0.03) !important}
body.mn-dragging{cursor:crosshair !important;user-select:none !important}

function buildChart(list){
if(distChart){try{distChart.destroy()}catch(e){}distChart=null}
var cv=document.getElementById("distCanvas");if(!cv||typeof Chart==="undefined")return;
var bins=Array(20).fill(0);list.forEach(function(p){bins[Math.min(Math.floor(p.score/5),19)]++});
var labels=[];for(var i=0;i<20;i++)labels.push(i*5);
var colors=bins.map(function(_,i){var mid=i*5+2.5;return(mid>=sLo&&mid<=sHi)?'rgba(255,255,255,0.25)':'rgba(255,255,255,0.04)'});
distChart=new Chart(cv,{type:'bar',data:{labels:labels,datasets:[{data:bins,backgroundColor:colors,borderRadius:2,barPercentage:0.85,categoryPercentage:0.92}]},options:{responsive:true,maintainAspectRatio:false,animation:{duration:200},plugins:{legend:{display:false},tooltip:{backgroundColor:'rgba(12,12,14,0.95)',titleColor:'rgba(255,255,255,0.4)',bodyColor:'#fff',titleFont:{size:8},bodyFont:{size:10,weight:'bold'},padding:5,cornerRadius:3,displayColors:false,callbacks:{title:function(t){return'Score '+t[0].label+'\u2013'+(parseInt(t[0].label)+4)},label:function(t){return t.raw+' people'}}}},scales:{x:{display:true,grid:{display:false},ticks:{color:'rgba(255,255,255,0.12)',font:{size:7},maxTicksLimit:5},border:{display:false}},y:{display:false}}}})}

// Animated stat counters
var prevSt={a:0,p:"0%",e:0,s:"0"};
function upSt(n,tot,ec,avg){
  animNum("stA",prevSt.a,n);prevSt.a=n;
  document.getElementById("stP").textContent=tot?pct(n,tot):"--";
  animNum("stE",prevSt.e,ec);prevSt.e=ec;
  document.getElementById("stS").textContent=avg}
function animNum(id,from,to){
  if(!to&&to!==0){document.getElementById(id).textContent="--";return}
  if(from===to){document.getElementById(id).textContent=to.toLocaleString();return}
  var el=document.getElementById(id),start=performance.now(),dur=180;
  function tick(now){var t=Math.min((now-start)/dur,1);t=t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
  var v=Math.round(from+(to-from)*t);el.textContent=v.toLocaleString();if(t<1)requestAnimationFrame(tick)}
  requestAnimationFrame(tick)}

// ── Intelligence Card ──
function genInsight(){
var l=gf(),n=l.length;
if(!n){document.getElementById("intelBody").innerHTML='<div class="mn-workspace-intel"><div class="mn-workspace-intel-body"><div class="mn-workspace-intel-verdict">Select a score range to see intelligence.<\/div><\/div><\/div>';return}
var tot=PP.length,ec=0,pc=0,oc=0,ss=0,sa=0;
l.forEach(function(p){if(p.email)ec++;if(p.phone)pc++;if(p.owner)oc++;ss+=p.score;sa+=p.age});
var avg=(ss/n).toFixed(1),aag=Math.round(sa/n),oP=Math.round(oc/n*100),eP=Math.round(ec/n*100);
var hi2=l.filter(function(p){return p.income==="$250-500k"||p.income==="$500k+"}).length;
var hi2P=Math.round(hi2/n*100);
var aOp=Math.round(PP.filter(function(p){return p.owner}).length/tot*100);
var topCity="";var cm={};l.forEach(function(p){cm[p.city]=(cm[p.city]||0)+1});
var best=0;Object.keys(cm).forEach(function(k){if(cm[k]>best){best=cm[k];topCity=k}});

// Generate verdict
var fCount=extraFilters?Object.keys(extraFilters).length:0;
var fLabel=fCount?fCount+" filter"+(fCount>1?"s":"")+" active. ":"";
var verdict,detail,confidence;
if(avg>=70){
verdict="High-value. Ready to activate.";
detail=fLabel+"Scores "+sLo+"\u2013"+sHi+" represent your strongest prospects: "+oP+"% homeowners (+"+(oP-aOp)+" pts vs baseline), "+hi2P+"% earning $250k+, avg age "+aag+". "+eP+"% are email-reachable. Concentrated in "+topCity+". This audience is ready for premium suite offers, membership upsells, and direct outreach.";
confidence="High confidence \u2014 strong signal density"
}else if(avg>=50){
verdict="Mid-tier. Viable with the right offer.";
detail=fLabel+"This range ("+sLo+"\u2013"+sHi+") has moderate propensity: "+oP+"% homeowners, "+hi2P+"% high-income, avg age "+aag+". Email reach at "+eP+"%. Not as concentrated as 70+ scores, but the volume ("+(Math.round(n*268000000/tot/1e6*10)/10)+"M at scale) makes it viable for mid-tier ticket bundles and multi-game packs.";
confidence="Moderate confidence \u2014 broader demographic mix"
}else if(avg>=30){
verdict="Broad. Awareness only.";
detail=fLabel+"Scores "+sLo+"\u2013"+sHi+" are mixed: "+oP+"% homeowners (baseline is "+aOp+"%), "+hi2P+"% high-income, avg age "+aag+". The demographic spread is wide. This segment works for digital awareness campaigns and value-tier offers, but premium products will underperform here.";
confidence="Lower confidence \u2014 diluted signal"
}else{
verdict="Weak. Not recommended.";
detail=fLabel+"Scores "+sLo+"\u2013"+sHi+" index below baseline on most dimensions: only "+oP+"% homeowners, "+hi2P+"% high-income. Avg age "+aag+" skews young. Channel reach is limited ("+eP+"% email). If you must target this group, use digital-only with value pricing. Consider raising the score floor.";
confidence="Low confidence \u2014 weak propensity signals"
}

// Active filter chips
var filterHTML='<div class="mn-workspace-intel-filters">';
filterHTML+='<button class="mn-workspace-intel-filter'+(extraFilters&&extraFilters.ownerOnly?" mn-workspace-intel-filter-on":"")+'" onclick="togFilt(\'ownerOnly\')">Homeowners<\/button>';

filterHTML+='<\/div>';

var h='<div class="mn-workspace-intel"><div class="mn-workspace-intel-body">';

window.addEventListener('message', function(e) {
  if (!e.data || !e.data.type) return;
  if (e.data.type === 'minerva-tour-click') {
    var el = document.querySelector(e.data.selector);
    if (el) el.click();
  }
  if (e.data.type === 'minerva-init') {
    if (e.data.mode) setMode(e.data.mode.charAt(0).toUpperCase() + e.data.mode.slice(1));
  }
  if (e.data.type === 'minerva-request-state') {
    var l=gf(),n=l.length,tot=PP.length;

});
